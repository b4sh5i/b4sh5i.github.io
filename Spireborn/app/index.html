<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Spireborn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <div id="hud"></div>
      <div id="overlay" class="hidden"></div>
      <div id="joystick" class="hidden">
        <div id="joystick-base"></div>
        <div id="joystick-stick"></div>
      </div>
      <button id="bonfire-prompt" class="hidden" type="button">
        <span class="prompt-key">E</span>
        <span class="prompt-text">화톳불 정비</span>
      </button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
