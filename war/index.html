<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Tower Defense (Mobile)</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="game-container">
        <!-- Top Info HUD -->
        <header class="hud-top">
            <div class="stat-box">
                <span class="label">ROUND</span>
                <span class="value" id="wave-display">1</span>
            </div>
            <div class="stat-box">
                <span class="label">ENEMIES</span>
                <span class="value" id="enemy-count-display">0</span>
            </div>
            <div class="stat-box">
                <span class="label">LIFE</span>
                <span class="value" id="life-display">50</span>
            </div>
            <div class="stat-box gold">
                <span class="label">GOLD</span>
                <span class="value" id="gold-display">100</span>
            </div>
            <div class="stat-box silver">
                <span class="label">SILVER</span>
                <span class="value" id="silver-display">0</span>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="game-area">
            <canvas id="gameCanvas"></canvas>

            <!-- Start Screen -->
            <div id="start-screen" class="overlay-screen">
                <h1 class="game-title">RANDOM<br>TOWER DEFENSE</h1>
                <p class="game-subtitle">Defend for 4 Laps!</p>
                <button id="start-btn" class="neon-btn big-btn">
                    <span class="icon">⚔️</span>
                    START GAME
                </button>
            </div>

            <!-- Game Over Screen -->
            <div id="game-overlay" class="hidden overlay-screen">
                <h1 id="overlay-title">GAME OVER</h1>
                <button id="restart-btn" class="neon-btn">RESTART</button>
            </div>
        </main>

        <!-- Bottom Control Panel -->
        <footer class="hud-bottom">
            <div class="panel-section info-panel">
                <h3>MISSIONS</h3>
                <div id="mission-list" class="mission-icons">
                    <!-- Icons injected by JS -->
                </div>
            </div>

            <div class="panel-section action-panel">
                <button id="btn-build" class="neon-btn big-btn">
                    <span class="icon">⚡</span>
                    SUMMON UNIT
                    <span class="cost">100 G</span>
                </button>
            </div>

            <div class="panel-section upgrade-panel">
                <h3>UPGRADES (Silver)</h3>
                <div class="upgrade-grid">
                    <button class="upgrade-btn" data-type="common">Common</button>
                    <button class="upgrade-btn" data-type="magic">Magic</button>
                    <button class="upgrade-btn" data-type="rare">Rare</button>
                    <button class="upgrade-btn" data-type="unique">Unique</button>
                    <button class="upgrade-btn" data-type="epic">Epic</button>
                </div>
            </div>
        </footer>
    </div>
    <!-- Scripts loaded in order -->
    <script src="constants.js"></script>
    <script src="Projectile.js"></script>
    <script src="Tower.js"></script>
    <script src="Enemy.js"></script>
    <script src="Game.js"></script>
    <script src="main.js"></script>
</body>

</html>
