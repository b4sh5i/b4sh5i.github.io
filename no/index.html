<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>당신은 바보입니까?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        /* Alert card - iOS style */
        .alert-container {
            position: relative;
            z-index: 10;
        }

        .alert-card {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 14px;
            width: 270px;
            box-shadow:
                0 0 0 0.5px rgba(255, 255, 255, 0.1),
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(83, 92, 236, 0.1);
            overflow: visible;
            animation: card-appear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes card-appear {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .alert-content {
            padding: 20px 16px 16px;
            text-align: center;
        }

        .alert-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            animation: icon-bounce 2s ease-in-out infinite;
        }

        @keyframes icon-bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .alert-title {
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .alert-message {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
        }

        .alert-divider {
            height: 0.5px;
            background: rgba(255, 255, 255, 0.12);
        }

        .alert-buttons {
            display: flex;
            height: 44px;
            position: relative;
        }

        .alert-btn {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            font-size: 17px;
            cursor: pointer;
            transition: background 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        .alert-btn:active {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-divider {
            width: 0.5px;
            background: rgba(255, 255, 255, 0.12);
        }

        .btn-no {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            border-radius: 0 0 0 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: visible;
        }

        .btn-yes {
            color: #5B9CFF;
            font-weight: 600;
            border-radius: 0 0 14px 0;
        }

        /* No button escape mode */
        .btn-no.escaping {
            position: fixed;
            width: 100px;
            height: 44px;
            border-radius: 22px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 0.5px rgba(255, 255, 255, 0.15),
                0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 100;
            flex: none;
        }

        /* Result overlay */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: overlay-appear 0.3s ease;
        }

        .result-overlay.show {
            display: flex;
        }

        @keyframes overlay-appear {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .result-card {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 14px;
            width: 270px;
            text-align: center;
            padding: 30px 20px;
            box-shadow:
                0 0 0 0.5px rgba(255, 255, 255, 0.1),
                0 25px 60px rgba(0, 0, 0, 0.5);
            animation: result-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes result-pop {
            0% {
                transform: scale(0.5) rotate(-5deg);
                opacity: 0;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .result-emoji {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
            animation: result-bounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes result-bounce {
            0% {
                transform: scale(0);
            }

            60% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        .result-text {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .result-subtext {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .result-btn {
            background: #5B9CFF;
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            font-size: 15px;
            font-weight: 600;
            padding: 10px 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .result-btn:hover {
            background: #4A8BEE;
            transform: scale(1.02);
        }

        .result-btn:active {
            transform: scale(0.98);
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 300;
        }

        .confetti {
            position: absolute;
            top: -10px;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(1080deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Background particles -->
    <div class="particles" id="particles"></div>


    <!-- Alert Card -->
    <div class="alert-container" id="alertContainer">
        <div class="alert-card" id="alertCard">
            <div class="alert-content">
                <span class="alert-icon">🤔</span>
                <div class="alert-title">당신은 바보입니까?</div>
                <div class="alert-message">솔직하게 대답해주세요</div>
            </div>
            <div class="alert-divider"></div>
            <div class="alert-buttons" id="buttonContainer">
                <button class="alert-btn btn-no" id="btnNo">No</button>
                <div class="btn-divider" id="btnDivider"></div>
                <button class="alert-btn btn-yes" id="btnYes">Yes</button>
            </div>
        </div>
    </div>

    <!-- Result overlay -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <span class="result-emoji">🎉</span>
            <div class="result-text">축하합니다!</div>
            <div class="result-subtext">당신은 스스로 바보임을 인정했습니다 👏</div>
            <button class="result-btn" id="retryBtn">다시하기</button>
        </div>
    </div>

    <!-- Confetti container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        // === Config ===
        const ESCAPE_DISTANCE = 150; // px - how close before No runs
        const MIN_ESCAPE_SPEED = 200; // px - minimum escape distance
        const MAX_ESCAPE_SPEED = 400; // px - maximum escape distance

        // === State ===

        let isEscaping = false;
        let noButtonRect = null;
        let escapeTimeout = null;

        // === DOM ===
        const btnNo = document.getElementById('btnNo');
        const btnYes = document.getElementById('btnYes');
        const btnDivider = document.getElementById('btnDivider');
        const buttonContainer = document.getElementById('buttonContainer');
        const alertCard = document.getElementById('alertCard');
        const resultOverlay = document.getElementById('resultOverlay');
        const confettiContainer = document.getElementById('confettiContainer');

        // === Background Particles ===
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // === Confetti ===
        function spawnConfetti() {
            const colors = ['#FF6B6B', '#FFE66D', '#4ECDC4', '#5B9CFF', '#FF69B4', '#A78BFA', '#34D399'];
            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = (Math.random() * 8 + 4) + 'px';
                c.style.height = (Math.random() * 8 + 4) + 'px';
                c.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                c.style.animationDelay = (Math.random() * 0.8) + 's';
                confettiContainer.appendChild(c);
            }
            setTimeout(() => confettiContainer.innerHTML = '', 4000);
        }

        // === Get random escape position ===
        function getEscapePosition(mouseX, mouseY) {
            const padding = 60;
            const w = window.innerWidth;
            const h = window.innerHeight;
            const btnW = 100;
            const btnH = 44;

            let newX, newY;
            let maxAttempts = 50;

            do {
                // Pick random direction away from mouse
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * (MAX_ESCAPE_SPEED - MIN_ESCAPE_SPEED) + MIN_ESCAPE_SPEED;
                newX = mouseX + Math.cos(angle) * dist - btnW / 2;
                newY = mouseY + Math.sin(angle) * dist - btnH / 2;

                // Clamp to viewport
                newX = Math.max(padding, Math.min(w - btnW - padding, newX));
                newY = Math.max(padding, Math.min(h - btnH - padding, newY));

                maxAttempts--;
            } while (maxAttempts > 0 && Math.hypot(newX + btnW / 2 - mouseX, newY + btnH / 2 - mouseY) < ESCAPE_DISTANCE);

            return { x: newX, y: newY };
        }

        // === Escape the No button ===
        function escapeNoButton(mouseX, mouseY) {
            if (!isEscaping) {
                // First escape: detach from card
                isEscaping = true;
                const rect = btnNo.getBoundingClientRect();

                btnNo.classList.add('escaping');
                btnNo.style.left = rect.left + 'px';
                btnNo.style.top = rect.top + 'px';
                document.body.appendChild(btnNo);

                // Hide the divider
                btnDivider.style.display = 'none';

                // Make Yes take full width
                btnYes.style.flex = '1';
                btnYes.style.borderRadius = '0 0 14px 14px';
            }

            const pos = getEscapePosition(mouseX, mouseY);
            btnNo.style.left = pos.x + 'px';
            btnNo.style.top = pos.y + 'px';
        }

        // === Mouse tracking for No button ===
        document.addEventListener('mousemove', (e) => {
            const rect = btnNo.getBoundingClientRect();
            const btnCenterX = rect.left + rect.width / 2;
            const btnCenterY = rect.top + rect.height / 2;
            const dist = Math.hypot(e.clientX - btnCenterX, e.clientY - btnCenterY);

            if (dist < ESCAPE_DISTANCE) {
                escapeNoButton(e.clientX, e.clientY);
            }
        });

        // === Touch tracking for No button ===
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = btnNo.getBoundingClientRect();
            const btnCenterX = rect.left + rect.width / 2;
            const btnCenterY = rect.top + rect.height / 2;
            const dist = Math.hypot(touch.clientX - btnCenterX, touch.clientY - btnCenterY);

            if (dist < ESCAPE_DISTANCE) {
                e.preventDefault();
                escapeNoButton(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        // === No button click — SWAP to Yes! ===
        btnNo.addEventListener('click', (e) => {
            // If they somehow click No, swap to Yes
            e.preventDefault();
            e.stopPropagation();

            // Visual swap trick
            btnNo.textContent = 'Yes';
            btnNo.style.color = '#5B9CFF';
            btnNo.style.fontWeight = '600';

            // Wait a beat then show result
            setTimeout(() => showResult(), 300);
        });

        // === Touchstart on No — also escape ===
        btnNo.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            e.preventDefault();
            // Swap text to Yes on touch
            btnNo.textContent = 'Yes';
            btnNo.style.color = '#5B9CFF';
            btnNo.style.fontWeight = '600';
            setTimeout(() => showResult(), 300);
        });

        // === Yes button click ===
        btnYes.addEventListener('click', () => {
            showResult();
        });

        // === Show result ===
        function showResult() {
            resultOverlay.classList.add('show');
            spawnConfetti();

            // Hide escaped No button
            if (isEscaping) {
                btnNo.style.display = 'none';
            }
        }

        // === Retry ===
        document.getElementById('retryBtn').addEventListener('click', () => {
            resultOverlay.classList.remove('show');
            confettiContainer.innerHTML = '';

            // Reset No button
            if (isEscaping) {
                btnNo.classList.remove('escaping');
                btnNo.style = '';
                btnNo.textContent = 'No';
                buttonContainer.insertBefore(btnNo, btnDivider);
                btnDivider.style.display = '';
                btnYes.style.flex = '';
                btnYes.style.borderRadius = '';
                btnNo.style.display = '';
                isEscaping = false;
            } else {
                btnNo.textContent = 'No';
                btnNo.style.color = '';
                btnNo.style.fontWeight = '';
            }


        });
    </script>
</body>

</html>
